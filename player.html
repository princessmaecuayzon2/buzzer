<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Player — PH History Buzzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
:root {
  --bg: #080810;
  --surface: #12121e;
  --surface2: #1a1a2a;
  --accent: #f5c842;
  --green: #3ecf72;
  --red: #e8503a;
  --text: #eeeef0;
  --muted: #666;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; overflow: hidden; }

.screen { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; max-width:420px; text-align:center; }
.screen.active { display:flex; }

/* JOIN */
.logo { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:3px; line-height:1; }
.logo span { color:var(--accent); }
.join-sub { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; margin-bottom:2.5rem; }
.join-card { background:var(--surface); border:0.5px solid var(--border2); border-radius:20px; padding:1.75rem; width:100%; }
.label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:block; text-align:left; }
.input { width:100%; background:var(--surface2); border:0.5px solid var(--border2); border-radius:10px; color:var(--text); font-family:'Sora',sans-serif; font-size:16px; padding:13px 16px; outline:none; transition:border-color 0.15s; margin-bottom:1rem; }
.input:focus { border-color:var(--accent); }
.session-display { background:var(--surface2); border-radius:10px; padding:10px 14px; font-size:13px; color:var(--muted); text-align:left; margin-bottom:1.25rem; }
.session-display strong { color:var(--accent); }
.btn-join { width:100%; background:var(--accent); color:#111; border:none; border-radius:12px; padding:15px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; cursor:pointer; transition:opacity 0.15s; }
.btn-join:hover { opacity:0.9; }

/* WAITING */
.wait-icon { font-size:56px; margin-bottom:1rem; animation:bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
.wait-title { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; margin-bottom:8px; }
.wait-sub { font-size:14px; color:var(--muted); line-height:1.6; }
.player-badge { display:inline-flex; align-items:center; gap:10px; background:var(--surface); border:0.5px solid var(--border2); border-radius:99px; padding:8px 18px 8px 8px; margin-top:1.5rem; }
.p-av-sm { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
.p-av-name { font-size:14px; font-weight:500; }

/* BUZZ */
#screen-buzz { background: radial-gradient(ellipse at 50% 50%, #1a1530 0%, #080810 65%); min-height:100vh; position:fixed; top:0;left:0;right:0;bottom:0; }
.buzz-q-num { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem; }
.buzz-q-text { font-size:clamp(17px,4vw,22px); font-weight:500; line-height:1.5; margin-bottom:2.5rem; color:var(--text); }
.timer-big { font-family:'Bebas Neue',sans-serif; font-size:72px; color:var(--accent); line-height:1; margin-bottom:2rem; transition:color 0.3s; }
.timer-big.urgent { color:var(--red); animation:urgentPulse 0.5s infinite; }
@keyframes urgentPulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* THE BUZZ BUTTON */
.buzz-btn-wrap { position:relative; margin-bottom:2rem; }
.buzz-btn {
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffe066, #f5c842 50%, #c99a1a);
  border: none;
  cursor: pointer;
  display: flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  box-shadow: 0 0 0 0 rgba(245,200,66,0.4), 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.1s, box-shadow 0.15s;
  animation: buzzGlow 3s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
  user-select:none;
}
@keyframes buzzGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(245,200,66,0.3), 0 8px 32px rgba(0,0,0,0.5); }
  50% { box-shadow: 0 0 0 20px rgba(245,200,66,0.08), 0 8px 40px rgba(245,200,66,0.2); }
}
.buzz-btn:active { transform:scale(0.93); box-shadow:0 4px 16px rgba(0,0,0,0.5); }
.buzz-btn .bell { font-size:52px; }
.buzz-btn .buzz-label { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:3px; color:#111; }
.buzz-btn:disabled { cursor:not-allowed; filter:grayscale(0.6); opacity:0.5; animation:none; }

/* After buzz states */
.buzz-result { font-size:14px; line-height:1.6; }
.rank-badge { font-family:'Bebas Neue',sans-serif; font-size:64px; line-height:1; margin-bottom:8px; }
.rank-badge.r1 { color:#f5c842; }
.rank-badge.r2 { color:#b0b0b0; }
.rank-badge.r3 { color:#cd7f32; }
.rank-badge.rX { color:var(--muted); }

/* Reveal */
#screen-reveal { min-height:100vh; position:fixed; top:0;left:0;right:0;bottom:0; background:var(--bg); }
.reveal-label { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem; }
.correct-big { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--green); letter-spacing:2px; animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
.wrong-big { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--red); letter-spacing:2px; animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn { from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1} }
.answer-text { font-size:16px; font-weight:500; color:var(--text); margin:12px 0 8px; line-height:1.4; }
.next-hint { font-size:13px; color:var(--muted); }

/* DONE */
#screen-done { min-height:100vh; }
.done-icon { font-size:72px; margin-bottom:1rem; }
.done-title { font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:2px; margin-bottom:8px; }
.done-sub { font-size:14px; color:var(--muted); }
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen active" id="screen-join">
  <div class="logo">🇵🇭<br>BUZZER</div>
  <p class="join-sub">Sprint Retro · PH History Challenge</p>
  <div class="join-card">
    <label class="label">Your name</label>
    <input class="input" id="name-input" placeholder="Enter your name..." maxlength="20" onkeydown="if(event.key==='Enter')joinSession()">
    <div class="session-display" id="session-display">Session: <strong id="session-name-display">loading...</strong></div>
    <button class="btn-join" onclick="joinSession()">JOIN GAME</button>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="screen-wait">
  <div class="wait-icon">⏳</div>
  <div class="wait-title">You're in!</div>
  <p class="wait-sub">Waiting for the host<br>to start the game...</p>
  <div class="player-badge">
    <div class="p-av-sm" id="wait-avatar"></div>
    <span class="p-av-name" id="wait-name"></span>
  </div>
</div>

<!-- BUZZ -->
<div class="screen" id="screen-buzz">
  <div class="buzz-q-num" id="buzz-q-num">Question 1 of 10</div>
  <div class="timer-big" id="timer-big">15</div>
  <div class="buzz-btn-wrap">
    <button class="buzz-btn" id="buzz-btn" onclick="doBuzz()">
      <span class="bell">🔔</span>
      <span class="buzz-label">BUZZ!</span>
    </button>
  </div>
  <div class="buzz-result" id="buzz-result"></div>
</div>

<!-- REVEAL -->
<div class="screen" id="screen-reveal">
  <div class="reveal-label">Answer revealed!</div>
  <div id="reveal-result"></div>
  <div class="answer-text" id="reveal-answer"></div>
  <div class="next-hint">Waiting for next question...</div>
</div>

<!-- DONE -->
<div class="screen" id="screen-done">
  <div class="done-icon">🏁</div>
  <div class="done-title">GAME OVER!</div>
  <p class="done-sub">Thanks for playing!<br>Check the host screen for results.</p>
</div>

<script>
const PUSHER_KEY = '8558cb36a5badd945460';
const PUSHER_CLUSTER = 'us2';
const AVATAR_COLORS = [
  {bg:'#1e1535',color:'#a78bfa'},{bg:'#0f2318',color:'#4ade80'},
  {bg:'#2a1010',color:'#f87171'},{bg:'#0e1d2e',color:'#60a5fa'},
  {bg:'#2a2208',color:'#fbbf24'},{bg:'#2a0e20',color:'#f472b6'},
  {bg:'#082a25',color:'#34d399'},{bg:'#1e2a08',color:'#a3e635'},
];

const QUESTIONS = [
  {cat:"Heroes & Figures",q:"Sino ang itinuturing na 'Ama ng Rebolusyong Pilipino'?",choices:["Jose Rizal","Andres Bonifacio","Apolinario Mabini","Emilio Aguinaldo"],ans:1},
  {cat:"Colonial History",q:"Noong ilang taon dumating si Ferdinand Magellan sa Pilipinas?",choices:["1521","1565","1543","1498"],ans:0},
  {cat:"National Symbols",q:"Ilang bituin ang nasa watawat ng Pilipinas?",choices:["2 — Luzon at Visayas","3 — Luzon, Visayas, Mindanao","4 — apat na rehiyon","8 — walong probinsya"],ans:1},
  {cat:"Heroes & Figures",q:"Sino ang bayaning Pilipino na pumatay kay Magellan sa Labanan ng Mactan?",choices:["Tupas","Humabon","Lapu-Lapu","Soliman"],ans:2},
  {cat:"Independence",q:"Kailan opisyal na nakamit ng Pilipinas ang kalayaan mula sa Estados Unidos?",choices:["Hunyo 12, 1898","Hulyo 4, 1946","Marso 17, 1935","Agosto 21, 1983"],ans:1},
  {cat:"Modern History",q:"Anong taon ang EDSA People Power Revolution?",choices:["1972","1983","1986","1989"],ans:2},
  {cat:"Culture & Geography",q:"Ano ang pinakamataas na bundok sa Pilipinas?",choices:["Bundok Mayon","Bundok Pulag","Bundok Pinatubo","Bundok Apo"],ans:3},
  {cat:"Colonial History",q:"Kanino pinangalanan ang Pilipinas?",choices:["Haring Felipe I","Haring Felipe II","Ferdinand Magellan","Papa Alexander VI"],ans:1},
  {cat:"Heroes & Figures",q:"Anong nobela ni Rizal ang nagbigay-inspirasyon sa rebolusyon?",choices:["El Filibusterismo","Noli Me Tangere","Florante at Laura","Ibong Adarna"],ans:1},
  {cat:"National Symbols",q:"Ano ang pambansang wika ng Pilipinas ayon sa konstitusyon?",choices:["Tagalog","Pilipino","Filipino","Cebuano"],ans:2},
];

const params = new URLSearchParams(location.search);
const sessionId = params.get('session') || 'retro-session';
document.getElementById('session-name-display').textContent = sessionId;

let pusher, channel;
let myId = Math.random().toString(36).slice(2,9);
let myName = '';
let myColorIdx = Math.floor(Math.random()*8);
let buzzed = false;
let currentQ = 0;
let timeLeft = 15;
let timerInterval = null;

function initials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function joinSession() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  myName = name;

  pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
  channel = pusher.subscribe(`presence-${sessionId}`);

  channel.bind('pusher:subscription_succeeded', () => {
    channel.trigger('client-player-join', { id: myId, name: myName });
  });

  channel.bind('client-game-start', () => showScreen('screen-buzz'));
  channel.bind('client-new-question', data => { currentQ = data.q; loadBuzzScreen(); });
  channel.bind('client-reveal', data => showReveal(data.ans));
  channel.bind('client-next-question', () => { loadBuzzScreen(); });

  // Setup wait screen
  const c = AVATAR_COLORS[myColorIdx];
  const av = document.getElementById('wait-avatar');
  av.style.background = c.bg; av.style.color = c.color;
  av.textContent = initials(name);
  document.getElementById('wait-name').textContent = name;

  showScreen('screen-wait');
}

function loadBuzzScreen() {
  buzzed = false;
  timeLeft = 15;
  const q = QUESTIONS[currentQ];
  document.getElementById('buzz-q-num').textContent = `Question ${currentQ+1} of ${QUESTIONS.length}`;
  document.getElementById('buzz-result').innerHTML = '';
  document.getElementById('buzz-btn').disabled = false;
  document.getElementById('buzz-btn').style.opacity = '1';

  const timer = document.getElementById('timer-big');
  timer.textContent = 15;
  timer.className = 'timer-big';

  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    timer.textContent = timeLeft;
    if (timeLeft<=5) timer.className='timer-big urgent';
    if (timeLeft<=0) { clearInterval(timerInterval); if(!buzzed){ document.getElementById('buzz-btn').disabled=true; document.getElementById('buzz-result').innerHTML='<span style="color:var(--muted)">Time\'s up!</span>'; } }
  },1000);

  showScreen('screen-buzz');
}

function doBuzz() {
  if (buzzed) return;
  buzzed = true;
  clearInterval(timerInterval);
  const elapsed = 15 - timeLeft;

  channel.trigger('client-buzz', { id:myId, name:myName, time:elapsed });

  document.getElementById('buzz-btn').disabled = true;
  document.getElementById('buzz-result').innerHTML = `
    <div style="animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275)">
      <div style="font-size:40px;">🔔</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);letter-spacing:2px;margin-top:8px;">BUZZED!</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px;">Wait for the host to call you!</div>
    </div>`;
}

function showReveal(ansIdx) {
  clearInterval(timerInterval);
  const q = QUESTIONS[currentQ];
  const ansText = q.choices[ansIdx];
  document.getElementById('reveal-answer').textContent = `✅ ${ansText}`;
  document.getElementById('reveal-result').innerHTML = `<div class="correct-big">CORRECT ANSWER</div>`;
  showScreen('screen-reveal');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
